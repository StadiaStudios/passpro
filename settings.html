    <div id="messageBox" class="fixed top-4 right-4 z-50 p-3 bg-green-500 text-white rounded-lg shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none" role="alert">
        Settings saved!
    </div>

    <script src="premium.js"></script>
    <script src="reset-theme.js"></script>
    <script>
        const STORAGE_KEY_NAMES = '__relationship_names';
        const STORAGE_KEY_THEME = '__app_theme';
        const STORAGE_KEY_PHOTO = '__relationship_photo_data';

        const darkModeToggle = document.getElementById('darkModeToggle');
        const name1Input = document.getElementById('name1');
        const name2Input = document.getElementById('name2');
        const saveNamesButton = document.getElementById('saveNames');
        const removePhotoButton = document.getElementById('removePhoto');
        const messageBox = document.getElementById('messageBox');

        function showMessage(message, bgColor) {
            messageBox.textContent = message;
            messageBox.className = `fixed top-4 right-4 z-50 p-3 text-white rounded-lg shadow-xl opacity-100 transition-opacity duration-300 ${bgColor}`;
            setTimeout(() => { messageBox.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        function applyTheme() {
            const savedTheme = localStorage.getItem(STORAGE_KEY_THEME) || 'light';
            const isDark = savedTheme === 'dark';
            document.body.classList.toggle('dark', isDark);
            darkModeToggle.checked = isDark;
        }

        function toggleDarkMode() {
            const isDark = darkModeToggle.checked;
            const theme = isDark ? 'dark' : 'light';
            localStorage.setItem(STORAGE_KEY_THEME, theme);
            applyTheme();
            showMessage(`Dark mode is now ${isDark ? 'ON' : 'OFF'}!`, 'bg-pink-600');
        }

        function loadNames() {
            const namesJson = localStorage.getItem(STORAGE_KEY_NAMES);
            let names = { name1: "", name2: "" };
            if (namesJson) {
                try {
                    names = JSON.parse(namesJson);
                } catch (e) {}
            }
            name1Input.value = names.name1 || "";
            name2Input.value = names.name2 || "";
        }
        
        function saveNames() {
            const name1 = name1Input.value.trim();
            const name2 = name2Input.value.trim();
            localStorage.setItem(STORAGE_KEY_NAMES, JSON.stringify({ name1, name2 }));
            showMessage("Names saved successfully!", "bg-green-600");
        }

        function removePhoto() {
            localStorage.removeItem(STORAGE_KEY_PHOTO);
            showMessage("Photo removed.", "bg-red-500");
        }

        window.onload = function() {
            applyTheme();
            loadNames();
            darkModeToggle.addEventListener('change', toggleDarkMode);
            saveNamesButton.addEventListener('click', saveNames);
            removePhotoButton.addEventListener('click', removePhoto);
        }
    </script>
