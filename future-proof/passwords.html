<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Manager - Vault</title>
    <script src="scripts/pinlock.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5vw;
        }
        #vault {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            border-color: #444;
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: #bb86fc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .card p {
            margin: 8px 0;
            font-size: 14px;
        }
        .card a {
            color: #03dac6;
            text-decoration: none;
        }
        .card a:hover {
            text-decoration: underline;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 8px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        .btn-danger {
            background-color: #cf6679;
            color: #121212;
        }
        .btn-danger:hover {
            background-color: #b35565;
        }
        .empty-state {
            text-align: center;
            color: #aaa;
            margin-top: 60px;
            grid-column: 1 / -1;
            font-size: 1.2rem;
        }
        ::-webkit-scrollbar {
            width: 12px;
            background: #181818;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d2d2d;
            border-radius: 8px;
            border: 2px solid #121212;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bb86fc;
        }
        ::-webkit-scrollbar-corner {
            background: #181818;
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #2d2d2d #181818;
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container">
    <h2>Your Vault</h2>
    <div id="vault"></div>
</div>

<script src="navbar.js"></script>

<script>
    function loadPasswords() {
        const vault = document.getElementById('vault');
        const data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };

        if (data.passwords.length === 0) {
            vault.innerHTML = '<div class="empty-state">No passwords saved yet.</div>';
            return;
        }

        vault.innerHTML = '';
        data.passwords.forEach((entry, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${entry.title}</h3>
                <p><strong>User/Email:</strong> ${entry.username}</p>
                <p><strong>Password:</strong> <span id="pwd-${index}">••••••••</span></p>
                ${entry.url ? `<p><strong>URL:</strong> <a href="${entry.url}" target="_blank">${entry.url}</a></p>` : ''}
                ${entry.notes ? `<p><strong>Notes:</strong> ${entry.notes}</p>` : ''}
                <div class="controls">
                    <button onclick="togglePassword(${index}, '${entry.password}')" id="btn-${index}">Show</button>
                    <button class="btn-danger" onclick="deletePassword(${index})">Delete</button>
                </div>
            `;
            vault.appendChild(card);
        });
    }

    function togglePassword(index, realPassword) {
        const span = document.getElementById(`pwd-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        if (span.innerText === '••••••••') {
            span.innerText = realPassword;
            btn.innerText = 'Hide';
        } else {
            span.innerText = '••••••••';
            btn.innerText = 'Show';
        }
    }

    function deletePassword(index) {
        if (confirm('Are you sure you want to delete this entry?')) {
            const data = JSON.parse(localStorage.getItem('pm_data'));
            data.passwords.splice(index, 1);
            localStorage.setItem('pm_data', JSON.stringify(data));
            loadPasswords();
        }
    }

    loadPasswords();
</script>

</body>
</html>
