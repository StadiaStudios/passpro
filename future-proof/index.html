<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PassPro - Add New</title>
    <script src="scripts/pinlock.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #bb86fc;
        }
        button {
            background-color: #bb86fc;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #9965f4;
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container">
    <h2>Add New Password</h2>
    <form id="addForm" autocomplete="off">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="e.g. Gmail" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="username">Username / Email</label>
            <input type="text" id="username" required placeholder="e.g. asdaw@gmail.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Your password" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" rows="3" placeholder="Optional notes..."></textarea>
        </div>
        <button type="submit">Save Password</button>
    </form>
</div>

<script src="navbar.js"></script>

<script>
    document.getElementById('addForm').addEventListener('submit', function (e) {
        e.preventDefault();

        let data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };

        const entry = {
            title: document.getElementById('title').value.trim(),
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            url: document.getElementById('url').value.trim(),
            notes: document.getElementById('notes').value.trim()
        };

        data.passwords.push(entry);
        localStorage.setItem('pm_data', JSON.stringify(data));

        alert('Password saved successfully!');
        this.reset();
    });
</script>

</body>
</html>
