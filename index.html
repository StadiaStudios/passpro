<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>PassPro - Dashboard | Add New</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">
    <script src="scripts/pinlock.js"></script>
    <script src="scripts/themes.js"></script>
    <script src="scripts/loading-screen.js"></script>
    <script src="scripts/closed-window.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #bb86fc;
        }
        button {
            background-color: #bb86fc;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #9965f4;
        }
        ::-webkit-scrollbar {
            width: 12px;
            background: #181818;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d2d2d;
            border-radius: 8px;
            border: 2px solid #121212;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bb86fc;
        }
        ::-webkit-scrollbar-corner {
            background: #181818;
        }
        .info-section {
            margin-top: 46px;
            padding: 22px 0 8px 0;
            border-top: 1px solid #24203a;
            text-align: center;
            color: #bbb;
            font-size: 15px;
        }
        .info-section-username {
            color: #fff;
            font-size: 1.13em;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        .info-section-count {
            color: #e3cc82;
            font-size: 1em;
            font-weight: 500;
            display: block;
            margin-bottom: 3px;
        }
        .info-section-sync {
            color: #b8b8b8;
            font-size: 0.96em;
            margin-bottom: 5px;
            display: block;
        }
        .lock-btn-container {
            position: fixed;
            top: 18px;
            right: 28px;
            z-index: 50000;
        }
        .lock-app-btn {
            padding: 8px 18px 8px 40px;
            background: linear-gradient(94deg,#111111 60%,#bb3535 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 12px #0003;
            transition: background 0.13s, box-shadow 0.13s;
            position: relative;
        }
        .lock-app-btn:before {
            content: '';
            display: block;
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            background-image: url('data:image/svg+xml;utf8,<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.83" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="8.5" width="12" height="7" rx="2.7" fill="none"/><path d="M7 8.5V6.1A3 3 0 0110 3a3 3 0 013 3.1v2.4"/></svg>');
            background-repeat: no-repeat;
            background-size: contain;
            opacity: 0.8;
            pointer-events: none;
        }
        .lock-app-btn:active {
            background: linear-gradient(94deg,#161616 60%,#260e0e 100%);
            box-shadow: 0 2px 8px #0003;
        }
        @media (max-width: 530px) {
            .lock-btn-container {
                top: 10px;
                right: 8px;
            }
            .lock-app-btn {
                font-size: 0.96rem;
                padding: 8px 12px 8px 31px;
            }
            .lock-app-btn:before {
                left: 8px;
                width: 15px;
                height: 15px;
            }
        }
    </style>
</head>
<body>
<div class="lock-btn-container">
    <button type="button" class="lock-app-btn" id="lockAppBtn" title="Lock App">Lock</button>
</div>

<div id="nav-placeholder" style="display:none;"></div>

<div class="container">
    <h2>Add New Password</h2>
    <form id="addForm" autocomplete="off">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="e.g. Gmail" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="username">Username / Email</label>
            <input type="text" id="username" required placeholder="e.g. asdaw@gmail.com" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Your password" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" rows="3" placeholder="Optional notes..."></textarea>
        </div>
        <button type="submit">Save Password</button>
    </form>

    <div class="info-section" id="infos">
        <span class="info-section-username" id="infoWelcome"></span>
        <span class="info-section-count" id="infoCount"></span>
        <span class="info-section-sync" id="infoSync"></span>
    </div>
</div>

<script src="navbar.js"></script>
<script>
    function getVaultData() {
        try {
            const raw = localStorage.getItem('pm_data');
            let data = raw ? JSON.parse(raw) : { passwords: [] };
            data.username = typeof data.username === "string" ? data.username : "";
            data.pin = typeof data.pin === "string" ? data.pin : "";
            return data;
        } catch {
            return { passwords: [], username: "", pin: "" };
        }
    }

    function getLastSyncDate() {
        const d = localStorage.getItem('pm_last_export');
        if (d) {
            const dt = new Date(parseInt(d));
            return dt.toLocaleString();
        }
        return "Never exported";
    }

    function updateBottomInfoSection() {
        const data = getVaultData();
        const uname = (data.username && data.username.trim().length) ? data.username.trim() : 'user';
        document.getElementById('infoWelcome').textContent = `Glad to see you back! ${uname} 👋`;
        const count = Array.isArray(data.passwords) ? data.passwords.length : 0;
        document.getElementById('infoCount').textContent = `Passwords Count: ${count}`;
        document.getElementById('infoSync').textContent = `Last Sync: ${getLastSyncDate()}`;
    }

    document.getElementById('addForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const data = getVaultData();
        const entry = {
            title: document.getElementById('title').value.trim(),
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            url: document.getElementById('url').value.trim(),
            notes: document.getElementById('notes').value.trim()
        };
        data.passwords.push(entry);
        localStorage.setItem('pm_data', JSON.stringify(data, null, 2));
        alert('Password saved successfully!');
        this.reset();
        updateBottomInfoSection();
    });

    updateBottomInfoSection();

    document.getElementById('lockAppBtn').addEventListener('click', function() {
        sessionStorage.removeItem('is_unlocked');
        window.location.reload();
    });

    function hideOrShowNavbar() {
        var navHost = document.getElementById('nav-placeholder');
        if (!navHost) return;
        var isUnlocked = sessionStorage.getItem('is_unlocked') === 'true';
        navHost.style.display = isUnlocked ? '' : 'none';
    }

    document.addEventListener('DOMContentLoaded', function () {
        hideOrShowNavbar();
        setInterval(hideOrShowNavbar, 500);
    });
</script>
<script src="scripts/update-screen.js"></script>
</body>
</html>
