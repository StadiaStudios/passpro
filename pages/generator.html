<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PassPro - Advanced Password Generator</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="manifest" href="../manifest.json">
    
    <meta name="theme-color" content="#111111"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap');
        
        :root {
            --primary: #ef4444; /* Was #4f46e5 */
            --primary-hover: #dc2626; /* Was #4338ca */
            --bg-dark: #111111;
        }

        body {
            font-family: 'Lexend Deca', sans-serif;
            background-color: #111111;
            min-height: 100vh;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Add top padding for body to prevent navbar overlap */
        @media (min-width: 0px) {
            body {
                padding-top: 64px; /* Default, can be adjusted if nav height differs */
            }
        }

        /* If needed, override for smaller/larger screens - you may tune as per actual navbar height */
        @media (max-width: 640px) {
            body {
                padding-top: 56px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }

        .glass-nav {
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }

        .glass-card {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 5px;
            background: #2a2a2a;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ef4444; /* Was #818cf8 */
            cursor: pointer;
            border: 2px solid #fff;
            transition: 0.2s;
        }

        .strength-bar {
            height: 6px;
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        .message-toast {
            animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .custom-checkbox:checked + .checkbox-bg {
            background-color: #ef4444; /* Was #4f46e5 */
        }
        .custom-checkbox:checked + .checkbox-bg .checkbox-dot {
            transform: translateX(1.25rem);
        }
    </style>
</head>
<body>
    <!-- Move navbar.js inclusion (which injects <nav>) to top of body so nav is rendered before content -->
    <script src="navbar.js"></script>

    <main class="flex-1 flex items-center justify-center p-6 md:p-10">
        <div class="w-full max-w-4xl space-y-10">
            
            <div class="text-center space-y-2">
                <h2 class="text-4xl font-bold text-white">Password Generator</h2>
                <p class="text-zinc-500">Create secure credentials with custom parameters</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                
                <div class="glass-card p-6 md:p-8 flex flex-col justify-between">
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <div id="password-display" class="w-full bg-black/40 border border-zinc-800 p-6 rounded-2xl text-2xl font-mono text-red-300 break-all min-h-[5rem] flex items-center justify-center text-center shadow-inner">
                                Generating...
                            </div>
                            <div class="flex gap-3">
                                <button onclick="copyPassword()" class="flex-1 bg-red-600 hover:bg-red-500 transition-all py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95">
                                    <i class="fas fa-copy"></i> Copy
                                </button>
                                <button onclick="generate()" class="w-16 bg-zinc-800 hover:bg-zinc-700 transition-all rounded-2xl flex items-center justify-center text-xl active:rotate-180 duration-500">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between text-[10px] font-black uppercase tracking-widest mb-2 text-zinc-500">
                                <span>Security Level</span>
                                <span id="strength-label">Strong</span>
                            </div>
                            <div class="bg-zinc-800 rounded-full w-full h-1.5 overflow-hidden">
                                <div id="strength-bar" class="strength-bar bg-red-500"></div>
                            </div>
                        </div>

                        <div class="pt-4">
                            <div class="flex justify-between mb-3 items-center">
                                <label class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Length</label>
                                <span id="length-val" class="text-red-400 font-black text-lg">16</span>
                            </div>
                            <input type="range" id="length-slider" min="6" max="100" value="16" class="slider" oninput="updateLength(this.value)">
                        </div>
                        <!-- Custom Keywords Input -->
                        <div class="pt-4">
                            <label for="custom-keywords-input" class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Add Custom Keywords</label>
                            <div class="flex items-center gap-2 mt-2">
                                <input 
                                    id="custom-keywords-input"
                                    type="text"
                                    placeholder="word1, word2, ..."
                                    class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-3 py-2 text-zinc-200 placeholder-zinc-500 text-xs focus:outline-none focus:border-red-600 transition"
                                    oninput="generate()"
                                >
                                <button
                                    type="button"
                                    onclick="document.getElementById('custom-keywords-input').value=''; generate();"
                                    class="text-zinc-500 hover:text-red-400 p-2 rounded-xl transition"
                                    title="Clear Keywords"
                                ><i class="fa fa-times"></i></button>
                            </div>
                            <p class="text-zinc-600 mt-1 text-xs">Separate keywords by commas. A random keyword will be inserted in each password.</p>
                        </div>
                        <!-- End Custom Keywords Input -->
                    </div>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="glass-card p-6 grid grid-cols-2 gap-4">
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Uppercase</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-upper" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>

                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Lowercase</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-lower" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>

                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Numbers</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-numbers" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>

                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Symbols</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-symbols" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>

                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Underscore (_)</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-extra" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>

                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm text-zinc-400 group-hover:text-white transition-colors">Period (.)</span>
                            <div class="relative inline-block w-11 h-6 shrink-0">
                                <input type="checkbox" id="check-periods" checked class="sr-only custom-checkbox" onchange="generate()">
                                <div class="checkbox-bg block bg-zinc-800 w-full h-full rounded-full transition-colors">
                                    <div class="checkbox-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                                </div>
                            </div>
                        </label>
                    </div>

                    <div class="glass-card flex-1 p-4 flex flex-col min-h-[150px]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">History</span>
                            <button onclick="clearHistory()" class="text-[10px] text-zinc-600 hover:text-red-400 transition-colors">Clear</button>
                        </div>
                        <div id="history-list" class="flex-1 space-y-2 overflow-y-auto pr-1 custom-scrollbar">
                            <p class="text-center text-zinc-700 text-xs mt-4">History log empty</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] pointer-events-none"></div>

    <script>
        const charSets = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^&*()+-=[]{}|;:",
            extra: "____",
            periods: "...."
        };

        // ---- Begin persistence code ----
        const HISTORY_STORAGE_KEY = "passpro_generator_history";
        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed)) return parsed;
                return [];
            } catch(e) {
                return [];
            }
        }
        function saveHistoryToStorage() {
            try {
                localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history));
            } catch(e){}
        }
        // ---- End persistence code ----

        let history = loadHistory();

        function updateLength(val) {
            document.getElementById('length-val').innerText = val;
            generate();
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-zinc-100 text-black px-6 py-3 rounded-xl shadow-2xl font-bold message-toast flex items-center gap-2";
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function copyPassword() {
            const pwd = document.getElementById('password-display').innerText;
            if (!pwd || pwd.includes("Generating") || pwd.includes("Select")) return;
            
            const el = document.createElement('textarea');
            el.value = pwd;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast("Copied");
        }

        function getCustomKeywordsArr() {
            const raw = (document.getElementById('custom-keywords-input')??{value:''}).value;
            // Split on comma, trim whitespace, remove empties
            return raw.split(",").map(w => w.trim()).filter(Boolean);
        }

        function generate() {
            const length = parseInt(document.getElementById('length-slider').value);
            const hasUpper = document.getElementById('check-upper').checked;
            const hasLower = document.getElementById('check-lower').checked;
            const hasNumbers = document.getElementById('check-numbers').checked;
            const hasSymbols = document.getElementById('check-symbols').checked;
            const hasExtra = document.getElementById('check-extra').checked;
            const hasPeriods = document.getElementById('check-periods').checked;
            const customKeywordsArr = getCustomKeywordsArr();

            let pool = "";
            if (hasUpper) pool += charSets.upper;
            if (hasLower) pool += charSets.lower;
            if (hasNumbers) pool += charSets.numbers;
            if (hasSymbols) pool += charSets.symbols;
            if (hasExtra) pool += charSets.extra;
            if (hasPeriods) pool += charSets.periods;

            const display = document.getElementById('password-display');
            
            if (pool === "" && (!customKeywordsArr.length)) {
                display.innerText = "Select Options";
                display.classList.add('text-red-500');
                updateStrength(0);
                return;
            } else {
                display.classList.remove('text-red-500');
            }

            let password = "";

            // If there are custom keywords, pick one at random to insert
            let chosenKeyword = null;
            if (customKeywordsArr.length) {
                // Pick a random keyword
                chosenKeyword = customKeywordsArr[Math.floor(Math.random() * customKeywordsArr.length)];
                // For diceware/word passphrase style, insert in a human memorable spot or random
                // We'll insert the keyword at a random position inside the final password string
                // But first, make the password shorter by the keyword length (so total length stays the same or longer)
                const pwdPartLen = Math.max(0, length - chosenKeyword.length);
                let core = "";
                for (let i = 0; i < pwdPartLen; i++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    core += pool[randomIndex];
                }
                // Insert keyword at a random position in the core string
                if (core.length===0) {
                    password = chosenKeyword;
                } else {
                    const insertIdx = Math.floor(Math.random() * (core.length + 1));
                    password = core.slice(0, insertIdx) + chosenKeyword + core.slice(insertIdx);
                }
            } else {
                // No custom keyword - regular logic:
                for (let i = 0; i < length; i++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    password += pool[randomIndex];
                }
            }

            display.innerText = password;
            
            if (history[0] !== password) {
                history.unshift(password);
                if (history.length > 10) history.pop();
                saveHistoryToStorage();
                updateHistoryUI();
            }

            calculateStrength(password, { hasUpper, hasLower, hasNumbers, hasSymbols, hasExtra, hasPeriods, length });
        }

        function calculateStrength(pwd, options) {
            let score = 0;
            if (options.length > 12) score += 1;
            if (options.length > 18) score += 1;
            if (options.length > 24) score += 1;
            
            let variety = 0;
            if (options.hasUpper) variety++;
            if (options.hasLower) variety++;
            if (options.hasNumbers) variety++;
            if (options.hasSymbols) variety++;
            if (options.hasExtra || options.hasPeriods) variety++;

            score += (variety * 1.5);
            
            let finalPercent = Math.min(100, (score / 10.5) * 100);
            updateStrength(finalPercent);
        }

        function updateStrength(percent) {
            const bar = document.getElementById('strength-bar');
            const label = document.getElementById('strength-label');
            
            bar.style.width = percent + "%";
            
            if (percent < 30) {
                bar.style.backgroundColor = "#ef4444";
                label.innerText = "Weak";
            } else if (percent < 60) {
                bar.style.backgroundColor = "#f59e0b";
                label.innerText = "Fair";
            } else if (percent < 85) {
                bar.style.backgroundColor = "#ef4444"; // Was #818cf8
                label.innerText = "Strong";
            } else {
                bar.style.backgroundColor = "#10b981";
                label.innerText = "Ultra";
            }
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = `<p class="text-center text-zinc-700 text-xs mt-4">History log empty</p>`;
                return;
            }
            
            list.innerHTML = history.map(item => `
                <div class="flex items-center justify-between p-3 bg-zinc-900/50 rounded-lg group border border-zinc-800/50 hover:border-zinc-700 transition-all">
                    <span class="font-mono text-zinc-400 truncate mr-3 text-xs">${item}</span>
                    <button onclick="copySpecific('${item}')" class="text-zinc-500 hover:text-white transition-colors">
                        <i class="fas fa-copy text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        // Modified: Add confirmation before clearing logs
        function clearHistory() {
            if (confirm('Are you sure you want to delete your logs?')) {
                history = [];
                saveHistoryToStorage();
                updateHistoryUI();
            }
        }

        function copySpecific(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Copied history item");
        }

        window.onload = function() {
            history = loadHistory();
            updateHistoryUI();
            generate();
        };
    </script>
    <!-- <script src="navbar.js"></script> --><!-- moved to top of body above -->
</body>
</html>
