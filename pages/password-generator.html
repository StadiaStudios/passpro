<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PassPro - Password Generator</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root {
            --background: #111;
            --accent: #bb86fc;
            --input: #1e1e1e;
            --input-border: #333;
            --generated: #1e1e24;
            --btn-bg: #232323;
            --btn-bg-hover: #2e2e2e;
            --btn-border: #444;
            --btn-text: #fff;
            --text-main: #e5e5e6;
            --text-muted: #bbbbbb;
            --strength-weak: #c95858;
            --strength-medium: #b99e4b;
            --strength-strong: #bbff86;
            --strength-ultra: #0066ff;

            --scrollbar-thumb: #393151;
            --scrollbar-thumb-hover: #6c53b1;
            --scrollbar-track: #1d192d;
        }
        body {
            background: var(--background);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
            scrollbar-width: thin;
        }
        body::-webkit-scrollbar {
            width: 10px;
            background: var(--scrollbar-track);
        }
        body::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 7px;
            transition: background 0.25s;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
        .pass-history-list {
            list-style: none;
            padding-left: 0;
            max-height: 15em;
            overflow-y: auto;
            font-family: 'Fira Mono', 'Consolas', monospace;
            font-size: 0.98rem;
            scrollbar-color: var(--accent) var(--background);
            scrollbar-width: thin;
        }
        .pass-history-list::-webkit-scrollbar {
            width: 8px;
            background: var(--scrollbar-track);
        }
        .pass-history-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }
        .pass-history-list::-webkit-scrollbar-thumb:hover {
            background: var(--btn-bg-hover);
        }
        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px 40px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 30px;
            text-align: center;
        }
        .generated-pass {
            font-family: 'Fira Mono', 'Consolas', monospace;
            font-size: 1.25rem;
            background: var(--generated);
            color: var(--accent);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0 30px 0;
            border: 1px solid var(--input-border);
            display: flex;
            align-items: center;
            user-select: all;
            word-break: break-all;
            letter-spacing: 0.06em;
            transition: background 0.2s;
            min-height: 30px;
        }
        #passText {
            flex: 1;
        }
        .icon-copy {
            margin-left: 15px;
            color: var(--btn-text);
            cursor: pointer;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 6px;
            font-size: 1.2rem;
            padding: 6px 12px;
            transition: all 0.2s;
        }
        .icon-copy:hover {
            background: var(--btn-bg-hover);
            border-color: var(--accent);
        }
        label {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }
        .input-group {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
        }
        .input-group.keywords {
            flex-direction: column;
            align-items: stretch;
            margin-bottom: 20px;
        }
        .input-group.keywords label {
            margin-bottom: 8px;
        }
        .keywords-input {
            padding: 12px 16px;
            background: var(--input);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 6px;
            width: 100%;
            font-size: 1.05rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .keywords-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        input[type="number"] {
            padding: 10px 14px;
            background: var(--input);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 6px;
            width: 80px;
            font-size: 1.05rem;
            margin-left: 15px;
            margin-right: 20px;
        }
        input[type="range"] {
            margin-left: 16px;
            flex: 1;
            accent-color: var(--accent);
        }
        .checkboxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .checkboxes label, .extra-checkboxes label {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        input[type="checkbox"] {
            accent-color: var(--accent);
            width: 20px; 
            height: 20px; 
            cursor: pointer;
        }
        .extra-checkboxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0 25px 0;
        }
        .btn-generate {
            margin-top: 25px;
            background: var(--accent);
            color: var(--background);
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            padding: 16px 0;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(187, 134, 252, 0.2);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(187, 134, 252, 0.3);
        }
        .btn-generate:active {
            transform: translateY(0);
        }
        .pass-strength {
            font-size: 1.05rem;
            text-align: right;
            margin-top: 10px;
            margin-bottom: -15px;
            font-weight: 600;
            opacity: 0.95;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .strength-meter-bar {
            background: var(--input);
            border-radius: 8px;
            overflow: hidden;
            flex: 1;
            height: 14px;
            margin-left: 15px;
            border: 1px solid var(--input-border);
        }
        .strength-meter-fill {
            height: 100%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .strength-weak   { background: var(--strength-weak); }
        .strength-medium { background: var(--strength-medium);}
        .strength-strong { background: var(--strength-strong);}
        .strength-ultra  { background: var(--strength-ultra);}
        .pass-history-section {
            margin-top: 45px;
            padding: 0 4px;
        }
        #historyTitle {
            color: var(--accent);
            font-size: 1.25rem;
            margin-bottom: .7em;
            margin-top: 0;
            text-align: center;
        }
        .history-action-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .clear-history-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 1rem;
            padding: 6px 18px 6px 14px;
            font-weight: 500;
            margin-bottom: 2px;
            margin-right: 10px;
            cursor: pointer;
            transition: background 0.17s,border 0.15s, color 0.17s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .clear-history-btn:hover {
            background: var(--accent);
            color: var(--background);
            border-color: var(--accent);
        }
        .pass-history-list {
        }
        .pass-history-list li {
            background: var(--generated);
            border-radius: 6px;
            border: 1px solid var(--input-border);
            color: white;
            margin-bottom: 8px;
            padding: 7px 11px 7px 11px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            word-break: break-all;
        }
        .history-copy-btn {
            display: inline-block;
            border-radius: 5px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 1em;
            cursor: pointer;
            padding: 2px 7px;
            margin-left: 10px;
            transition: all 0.1s;
        }
        .history-copy-btn:hover {
            background: var(--btn-bg-hover);
            border-color: var(--accent);
            color: var(--accent);
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .checkboxes, .extra-checkboxes { grid-template-columns: 1fr; }
            .pass-history-list {font-size:0.86rem;}
        }
        .history-count-badge {
            background: var(--accent);
            color: var(--background);
            border-radius: 1em;
            font-size: .93em;
            font-weight: bold;
            padding: 2px 11px;
            margin-left: 0.6em;
            vertical-align: text-bottom;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h2>Password Generator</h2>
        <div class="generated-pass">
            <span id="passText">Click 'Generate' for password</span>
            <button class="icon-copy" id="copyBtn" title="Copy to clipboard" style="display:none;">&#128203;</button>
        </div>
        <div class="pass-strength" id="strength">
            <span id="strengthText">Strength: -</span>
            <div class="strength-meter-bar">
                <div class="strength-meter-fill" id="strengthMeter" style="width:0;"></div>
            </div>
        </div>
        <br><br><br><br>
        <form id="generatorForm" autocomplete="off">
            <div class="input-group keywords">
                <label for="keywords">Add Keywords (Comma separated)</label>
                <input type="text" id="keywords" name="keywords" class="keywords-input" placeholder="e.g. apple, 1999, Cat" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="length">Total Length</label>
                <input type="number" id="length" name="length" min="8" max="64" value="16">
                <input type="range" id="rangeLength" name="rangeLength" min="8" max="64" value="16">
            </div>
            <div class="checkboxes">
                <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
                <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
                <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
                <label><input type="checkbox" id="symbols"> Symbols (!@#$)</label>
            </div>
            <div class="extra-checkboxes">
                <label><input type="checkbox" id="period"> Period (.)</label>
                <label><input type="checkbox" id="underscore"> Underscore (_)</label>
            </div>
            <button type="submit" class="btn-generate">Generate Password</button>
        </form>
        <section class="pass-history-section">
            <h3 id="historyTitle">
                Recent Passwords
                <span id="historyCount" class="history-count-badge" style="display:none;">0</span>
            </h3>
            <div class="history-action-bar">
                <button type="button" id="clearHistoryBtn" class="clear-history-btn" title="Clear password history">
                    &#128465; Clear History
                </button>
            </div>
            <ul id="passwordHistory" class="pass-history-list"></ul>
        </section>
    </div>
    <script src="navbar.js"></script>
    <script>
        const lengthInput = document.getElementById('length');
        const rangeInput = document.getElementById('rangeLength');
        const passHistoryList = document.getElementById('passwordHistory');
        const HISTORY_KEY = "passpro.password_history";
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const historyCount = document.getElementById('historyCount');

        lengthInput.addEventListener('input', () => {
            if (+lengthInput.value < 8) lengthInput.value = 8;
            if (+lengthInput.value > 64) lengthInput.value = 64;
            rangeInput.value = lengthInput.value;
        });
        rangeInput.addEventListener('input', () => {
            lengthInput.value = rangeInput.value;
        });

        function getCharset(opts){
            let chars = '';
            if(opts.lowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if(opts.uppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if(opts.numbers) chars += '0123456789';
            if(opts.symbols) chars += '!@#$%^&*()-+=[]{}|;:,.<>?/~';
            if(opts.period) chars += '.';
            if(opts.underscore) chars += '_';
            return chars;
        }

        function parseKeywords(str) {
            if (!str) return [];
            return str.split(',').map(k => k.trim()).filter(Boolean);
        }

        function generatePassword(length, opts, keywords) {
            let charset = getCharset(opts);
            if (!charset && keywords.length === 0) return '';
            let passwordChars = [];
            let baseKeywords = keywords.join('');
            if (baseKeywords.length > length) {
                baseKeywords = baseKeywords.slice(0, length);
            }
            passwordChars = passwordChars.concat(baseKeywords.split(''));
            const pools = [
                opts.lowercase ? 'abcdefghijklmnopqrstuvwxyz' : '',
                opts.uppercase ? 'ABCDEFGHIJKLMNOPQRSTUVWXYZ' : '',
                opts.numbers   ? '0123456789' : '',
                opts.symbols   ? '!@#$%^&*()-+=[]{}|;:,.<>?/~' : '',
                opts.period    ? '.' : '',
                opts.underscore ? '_' : ''
            ].filter(Boolean);
            pools.forEach(pool => {
                if (pool.length === 0) return;
                let found = passwordChars.some(c => pool.includes(c));
                if (!found && passwordChars.length < length) {
                    let ch = pool[Math.floor(Math.random() * pool.length)];
                    passwordChars.push(ch);
                }
            });
            while (passwordChars.length < length && charset.length > 0) {
                let ch = charset[Math.floor(window.crypto.getRandomValues(new Uint32Array(1))[0] / 2**32 * charset.length)];
                passwordChars.push(ch);
            }
            let remainingChars = length - baseKeywords.length;
            let randomSection = passwordChars.slice(baseKeywords.length);
            randomSection = randomSection.sort(() => 0.5 - Math.random());
            let finalPassword = randomSection.join('');
            keywords.forEach(kw => {
                if(finalPassword.length + kw.length <= length) {
                    let insPos = Math.floor(Math.random() * (finalPassword.length + 1));
                    finalPassword = finalPassword.slice(0, insPos) + kw + finalPassword.slice(insPos);
                } else if (finalPassword.length < length) {
                     finalPassword += kw;
                     finalPassword = finalPassword.slice(0, length);
                }
            });
            return finalPassword || baseKeywords;
        }

        function estimateStrength(pass, opts, keywords) {
            if (!pass || pass.startsWith('Click') || pass.startsWith('Select')) 
                return { score: 0, label: "Strength: -", percent: 0, entropy: 0, details: '' };
            const hasLower = /[a-z]/.test(pass);
            const hasUpper = /[A-Z]/.test(pass);
            const hasNumber = /\d/.test(pass);
            const hasSymbol = /[!@#$%^&*()\-\+=\[\]{}|;:,.<>?\/~]/.test(pass);
            const hasPeriod = /\./.test(pass);
            const hasUnderscore = /_/.test(pass);
            let pool = 0;
            if(hasLower) pool += 26;
            if(hasUpper) pool += 26;
            if(hasNumber) pool += 10;
            if(hasSymbol) pool += 23;
            if(hasPeriod) pool += 1;
            if(hasUnderscore) pool += 1;
            let length = pass.length;
            let repetitionPenalty = 0;
            if (/(.)\1{3,}/.test(pass)) repetitionPenalty += 10;
            let keywordPenalty = 0;
            keywords.forEach(kw => {
                if(kw.length > 1 && pass.toLowerCase().includes(kw.toLowerCase())) {
                    keywordPenalty += 8 * kw.length;
                }
            });
            let lengthPenalty = 0;
            if(length < 12) lengthPenalty += 12 - length;
            if(pool <= 23 && length < 24) lengthPenalty += 10;
            let rawEntropy = (Math.log2(Math.max(pool, 2)) * length);
            let entropy = rawEntropy - repetitionPenalty - keywordPenalty - lengthPenalty;
            let score, label, percent, colorClass;
            if (entropy < 24) {
                score = 1; label = "Strength: Very Weak"; percent = Math.max(10, entropy / 36 * 20);
                colorClass = 'strength-weak';
            } else if (entropy < 36) {
                score = 2; label = "Strength: Weak"; percent = 22 + Math.min((entropy-24)*2, 24);
                colorClass = 'strength-weak';
            } else if (entropy < 48) {
                score = 3; label = "Strength: Okay"; percent = 47 + Math.min((entropy-36)*2.3, 24);
                colorClass = 'strength-medium';
            } else if (entropy < 64) {
                score = 4; label = "Strength: Strong"; percent = 72 + Math.min((entropy-48)*1.5, 20);
                colorClass = 'strength-strong';
            } else {
                score = 5; label = "Strength: Excellent"; percent = 98;
                colorClass = 'strength-ultra';
            }
            percent = Math.round(percent);
            return { score, label, percent, entropy: Math.max(0, Math.round(entropy)), colorClass };
        }

        function loadHistory() {
            try {
                let stored = window.localStorage.getItem(HISTORY_KEY);
                if (!stored) return [];
                let arr = JSON.parse(stored);
                if (!Array.isArray(arr)) return [];
                return arr;
            } catch {
                return [];
            }
        }
        function saveHistory(arr) {
            window.localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
        }
        function addToHistory(password, entropy, label) {
            if (!password || password === 'Click \'Generate\' for password' || password.startsWith('Select')) return;
            let arr = loadHistory();
            arr = arr.filter(item => item.pass !== password);
            arr.unshift({ pass: password, entropy: entropy, label: label, ts: Date.now() });
            saveHistory(arr);
        }
        function renderHistory() {
            let arr = loadHistory();
            passHistoryList.innerHTML = '';
            if (historyCount) {
                historyCount.textContent = arr.length;
                historyCount.style.display = arr.length > 0 ? '' : 'none';
            }
            if (!arr.length) {
                passHistoryList.innerHTML = `<li style="color:var(--text-muted);background:none;border:none;text-align:center;">No history yet.</li>`;
                return;
            }
            arr.forEach((item, idx) => {
                let displayEntropy = item.entropy !== undefined ? ` <span title="bits of entropy" style="color:var(--text-muted);font-size:.93em;">[${item.entropy}b]</span>` : '';
                let entClass = '';
                if (item.label.includes('Excellent')) entClass = 'strength-ultra';
                else if (item.label.includes('Strong')) entClass = 'strength-strong';
                else if (item.label.includes('Okay')) entClass = 'strength-medium';
                else entClass = 'strength-weak';
                passHistoryList.insertAdjacentHTML('beforeend', `
                    <li>
                        <span style="flex:1;word-break:break-all;">
                            <span class="${entClass}" style="font-weight:600;">${item.pass}</span>
                            ${displayEntropy}
                        </span>
                        <button class="history-copy-btn" title="Copy" data-copy="${encodeURIComponent(item.pass)}">&#128203;</button>
                    </li>
                `);
            });
        }
        passHistoryList.addEventListener('click', function (e) {
            if (e.target.classList.contains('history-copy-btn')) {
                let val = decodeURIComponent(e.target.getAttribute('data-copy'));
                navigator.clipboard.writeText(val).then(() => {
                    e.target.innerHTML = '&#10003;';
                    e.target.title = "Copied!";
                    e.target.style.borderColor = "var(--strength-strong)";
                    e.target.style.color = "var(--strength-strong)";
                    setTimeout(() => {
                        e.target.innerHTML = '&#128203;';
                        e.target.title = "Copy";
                        e.target.style.borderColor = "";
                        e.target.style.color = "";
                    }, 1200);
                });
            }
        });

        const form = document.getElementById('generatorForm');
        const passText = document.getElementById('passText');
        const strengthDiv = document.getElementById('strength');
        const copyBtn = document.getElementById('copyBtn');
        const keywordsInput = document.getElementById('keywords');
        const periodInput = document.getElementById('period');
        const underscoreInput = document.getElementById('underscore');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthText = document.getElementById('strengthText');

        function updateStrength(showPass) {
            let val = showPass !== undefined ? showPass : passText.textContent;
            if (!val || val.trim().length === 0 || val.startsWith('Click') || val.startsWith('Select at least')) {
                strengthText.textContent = "Strength: -";
                strengthMeter.style.width = "0";
                strengthMeter.className = "strength-meter-fill";
                return;
            }
            const opts = {
                lowercase: document.getElementById('lowercase').checked,
                uppercase: document.getElementById('uppercase').checked,
                numbers: document.getElementById('numbers').checked,
                symbols: document.getElementById('symbols').checked,
                period: document.getElementById('period').checked,
                underscore: document.getElementById('underscore').checked
            };
            const keywords = parseKeywords(keywordsInput.value);
            const result = estimateStrength(val, opts, keywords);
            strengthText.textContent = result.label + (typeof result.entropy === 'number' && result.entropy > 0 ? ` (${result.entropy}b)` : '');
            let cls = "strength-meter-fill";
            if (result.colorClass) cls += " " + result.colorClass;
            strengthMeter.className = cls;
            strengthMeter.style.width = result.percent + "%";
        }

        form.addEventListener('submit', function(e){
            e.preventDefault();
            const opts = {
                length: +lengthInput.value,
                lowercase: document.getElementById('lowercase').checked,
                uppercase: document.getElementById('uppercase').checked,
                numbers: document.getElementById('numbers').checked,
                symbols: document.getElementById('symbols').checked,
                period: periodInput.checked,
                underscore: underscoreInput.checked
            };
            if(!opts.lowercase && !opts.uppercase && !opts.numbers && !opts.symbols && !opts.period && !opts.underscore && !keywordsInput.value.trim()){
                passText.textContent = 'Select at least one type or add keywords!';
                updateStrength('');
                copyBtn.style.display = 'none';
                return;
            }
            const keywords = parseKeywords(keywordsInput.value);
            const password = generatePassword(opts.length, opts, keywords);
            passText.textContent = password;
            copyBtn.style.display = password ? 'inline-block' : 'none';
            const result = estimateStrength(password, opts, keywords);
            updateStrength(password);
            addToHistory(password, result.entropy, result.label);
            renderHistory();
        });

        ['input', 'change'].forEach(ev => {
            lengthInput.addEventListener(ev, () => updateStrength());
            rangeInput.addEventListener(ev, () => updateStrength());
            keywordsInput.addEventListener(ev, () => updateStrength());
            document.querySelectorAll('input[type="checkbox"]').forEach(chk => {
                chk.addEventListener(ev, () => updateStrength());
            });
        });

        copyBtn.addEventListener('click', function(){
            const text = passText.textContent;
            if (!text || text.startsWith('Select at least') || text.startsWith('Click')) return;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.innerHTML = '&#10003;';
                copyBtn.title = "Copied!";
                copyBtn.style.borderColor = "var(--strength-strong)";
                copyBtn.style.color = "var(--strength-strong)";
                setTimeout(() => {
                    copyBtn.innerHTML = '&#128203;';
                    copyBtn.title = "Copy to clipboard";
                    copyBtn.style.borderColor = "";
                    copyBtn.style.color = "";
                }, 1200);
            });
        });

        clearHistoryBtn.addEventListener('click', function() {
            if (window.confirm("Clear all password history?")) {
                saveHistory([]);
                renderHistory();
            }
        });

        updateStrength();
        renderHistory();
    </script>
</body>
</html>
