<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PassPro - Card Vault</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #f3f4f6;
            min-height: 100vh;
        }

        .card-visual {
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: rgba(255, 255, 255, 0.2) !important;
            background: rgba(255, 255, 255, 0.05) !important;
            outline: none;
        }

        #cardModal {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
        }
        #cardModal.hidden {
            display: none;
            transform: translateY(50px);
            opacity: 0;
        }
        #cardModal.show {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        .card-item-hover {
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            cursor: grab;
            touch-action: none;
        }
        .card-item-hover:active {
            cursor: grabbing;
        }
        .card-item-hover:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
        }

        .sortable-ghost {
            opacity: 0.3;
            background: rgba(59, 130, 246, 0.1) !important;
            border: 1px dashed rgba(59, 130, 246, 0.5) !important;
        }
        .sortable-chosen {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.7);
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 1000;
            display: none;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="antialiased">

    <div id="copyToast" class="copy-toast">Copied to clipboard</div>

    <main class="pt-28 px-6 pb-12 max-w-7xl mx-auto">
        <div class="mb-10 max-w-2xl flex flex-row gap-4 items-center">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-600"></i>
                <input type="text" id="searchInput" placeholder="Search cards by label or number..." 
                       class="w-full rounded-2xl py-4 pl-14 pr-6 text-sm">
            </div>
            
            <div class="flex gap-2 shrink-0">
                <button id="export-cards-btn" class="text-xs bg-white/5 px-5 py-4 rounded-xl hover:bg-white/10 transition flex items-center justify-center cursor-pointer border border-white/5 h-[54px]">
                    <i class="fas fa-download mr-2"></i> Export
                </button>
                <label for="import-cards-input" class="text-xs bg-white/5 px-5 py-4 rounded-xl hover:bg-white/10 transition flex items-center justify-center cursor-pointer border border-white/5 h-[54px]">
                    <i class="fas fa-upload mr-2"></i> Import
                    <input type="file" id="import-cards-input" class="hidden">
                </label>
            </div>
        </div>

        <div class="mb-4 flex items-center justify-between">
            <p id="sortHint" class="text-[10px] text-gray-600 uppercase tracking-[0.2em] font-bold hidden">
                <i class="fas fa-grip-lines mr-2"></i> Hold and drag cards to rearrange
            </p>
        </div>

        <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="emptyState" class="hidden py-32 flex flex-col items-center justify-center text-center">
            <div class="w-24 h-24 rounded-full bg-white/5 flex items-center justify-center mb-6 border border-white/5">
                <i class="fas fa-credit-card text-4xl text-gray-700"></i>
            </div>
            <h2 class="text-xl font-semibold text-gray-300">No cards found</h2>
            <p class="text-gray-500 mt-2 max-w-xs mx-auto">Safely store your credit and debit cards for easy access.</p>
            <button onclick="openModal()" class="mt-8 text-blue-500 font-medium hover:underline">Add a card now</button>
        </div>
    </main>

    <div id="cardModal" class="fixed inset-0 z-[120] hidden bg-[#080808] overflow-y-auto">
        <header class="sticky top-0 z-10 bg-black/80 backdrop-blur-xl border-b border-white/5 px-6 py-5 flex items-center justify-between">
            <button onclick="closeModal()" class="text-gray-400 hover:text-white transition flex items-center gap-2">
                <i class="fas fa-times text-lg"></i>
                <span id="closeBtnText" class="text-sm font-medium">Cancel</span>
            </button>
            <h2 id="modalTitle" class="text-lg font-bold">New Card</h2>
            <div class="flex items-center gap-2">
                <button id="editBtn" onclick="toggleEditMode(true)" class="hidden text-gray-400 font-bold px-4 py-2 hover:bg-white/5 rounded-lg transition">Edit</button>
                <button id="doneBtn" onclick="saveCard()" class="text-blue-500 font-bold px-4 py-2 hover:bg-blue-500/10 rounded-lg transition">Done</button>
            </div>
        </header>

        <div class="max-w-xl mx-auto px-6 py-10">
            <div class="card-visual w-full aspect-[1.58/1] rounded-3xl p-8 mb-12 flex flex-col justify-between relative overflow-hidden group">
                <div class="flex justify-between items-start">
                    <div class="w-14 h-11 bg-yellow-500/20 rounded-lg border border-yellow-500/20 flex items-center justify-center">
                        <div class="w-10 h-7 bg-yellow-600/30 rounded-md"></div>
                    </div>
                    <i id="previewType" class="fab fa-cc-visa text-4xl opacity-40"></i>
                </div>
                <div>
                    <p id="previewNumber" class="mono text-2xl tracking-[0.15em] mb-6">•••• •••• •••• ••••</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Card Holder</p>
                            <p id="previewName" class="text-sm font-semibold tracking-widest uppercase">YOUR NAME</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] uppercase tracking-[0.2em] text-gray-500 mb-1">Expiry</p>
                            <p id="previewExpiry" class="text-sm mono font-bold">00/00</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -top-1/2 -left-1/2 w-full h-full bg-white/5 rotate-45 pointer-events-none"></div>
            </div>

            <div class="space-y-6" id="formContent">
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Card Nickname</label>
                    <div class="relative group">
                        <input type="text" id="cardLabel" placeholder="e.g. Work Visa" class="w-full rounded-xl px-5 py-4">
                        <button onclick="copyToClipboard('cardLabel')" class="copy-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-blue-500 hidden"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Card Number</label>
                    <div class="relative">
                        <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" class="w-full rounded-xl px-5 py-4 mono">
                        <button onclick="copyToClipboard('cardNumber')" class="copy-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-blue-500 hidden"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Expiration</label>
                        <div class="relative">
                            <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" class="w-full rounded-xl px-5 py-4 mono">
                            <button onclick="copyToClipboard('cardExpiry')" class="copy-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-blue-500 hidden"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">CVV</label>
                        <div class="relative">
                            <input type="password" id="cardCvv" placeholder="•••" maxlength="4" class="w-full rounded-xl px-5 py-4 mono">
                            <button onclick="copyToClipboard('cardCvv')" class="copy-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-blue-500 hidden"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Cardholder Name</label>
                    <div class="relative">
                        <input type="text" id="cardHolder" placeholder="FULL NAME" class="w-full rounded-xl px-5 py-4 uppercase">
                        <button onclick="copyToClipboard('cardHolder')" class="copy-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 hover:text-blue-500 hidden"><i class="fas fa-copy"></i></button>
                    </div>
                </div>

                <div id="deleteContainer" class="hidden pt-8">
                    <button onclick="deleteCard()" class="w-full py-4 text-red-500 font-semibold border border-red-500/20 bg-[#111] rounded-xl hover:bg-red-500/10 transition">
                        Delete Card Forever
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let vaultData = JSON.parse(localStorage.getItem('passpro_data') || '[]');
        let currentEditId = null;
        let isEditMode = false;

        const cardsGrid = document.getElementById('cardsGrid');
        const emptyState = document.getElementById('emptyState');
        const cardModal = document.getElementById('cardModal');
        const searchInput = document.getElementById('searchInput');

        const inNum = document.getElementById('cardNumber');
        const inName = document.getElementById('cardHolder');
        const inExp = document.getElementById('cardExpiry');
        const preNum = document.getElementById('previewNumber');
        const preName = document.getElementById('previewName');
        const preExp = document.getElementById('previewExpiry');
        const preType = document.getElementById('previewType');

        function init() {
            renderCards();
            setupListeners();
            initSortable();
        }

        function initSortable() {
            new Sortable(cardsGrid, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                delay: 150,
                delayOnTouchOnly: true,
                onEnd: function () {
                    const newOrder = Array.from(cardsGrid.children).map(el => el.getAttribute('data-id'));
                    const nonCards = vaultData.filter(item => item.type !== 'card');
                    const currentCards = vaultData.filter(item => item.type === 'card');
                    const sortedCards = newOrder.map(id => currentCards.find(c => c.id === id));
                    vaultData = [...nonCards, ...sortedCards];
                    localStorage.setItem('passpro_data', JSON.stringify(vaultData));
                }
            });
        }

        function setupListeners() {
            inNum.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, '').substring(0, 16);
                let formatted = val.match(/.{1,4}/g)?.join(' ') || '';
                e.target.value = formatted;
                preNum.innerText = formatted || '•••• •••• •••• ••••';
                
                if(val.startsWith('4')) preType.className = 'fab fa-cc-visa text-4xl text-blue-400';
                else if(val.startsWith('5')) preType.className = 'fab fa-cc-mastercard text-4xl text-orange-400';
                else if(val.startsWith('3')) preType.className = 'fab fa-cc-amex text-4xl text-green-400';
                else preType.className = 'fas fa-credit-card text-4xl opacity-40';
            });

            inName.addEventListener('input', (e) => {
                preName.innerText = e.target.value.toUpperCase() || 'YOUR NAME';
            });

            inExp.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length >= 2) val = val.substring(0,2) + '/' + val.substring(2,4);
                e.target.value = val;
                preExp.innerText = val || '00/00';
            });
        }

        function renderCards(filter = '') {
            cardsGrid.innerHTML = '';
            const cards = vaultData.filter(item => item.type === 'card' && 
                (item.label?.toLowerCase().includes(filter.toLowerCase()) || 
                 item.number?.includes(filter)));

            const sortHint = document.getElementById('sortHint');

            if (cards.length === 0) {
                emptyState.classList.remove('hidden');
                sortHint.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            if (!filter) sortHint.classList.remove('hidden');
            else sortHint.classList.add('hidden');

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-item-hover bg-white/5 rounded-2xl p-6 border border-white/5 flex flex-col justify-between h-44 relative';
                cardEl.setAttribute('data-id', card.id);
                
                cardEl.innerHTML = `
                    <div class="flex justify-between items-start pointer-events-none">
                        <div class="flex gap-4 items-center">
                            <div class="w-12 h-12 rounded-xl bg-black/40 flex items-center justify-center border border-white/5">
                                <i class="fab ${card.number.startsWith('4') ? 'fa-cc-visa text-blue-400' : 'fa-cc-mastercard text-orange-400'} text-xl"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-white">${card.label}</h3>
                                <p class="text-[10px] text-gray-500 tracking-widest uppercase mt-0.5">${card.holder}</p>
                            </div>
                        </div>
                        <span class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-500 mono font-bold">${card.expiry}</span>
                    </div>
                    <div class="flex items-end justify-between pointer-events-none">
                        <p class="mono text-lg tracking-widest text-gray-400">•••• •••• •••• ${card.number.slice(-4)}</p>
                        <i class="fas fa-shield-alt text-gray-700 text-sm mb-1"></i>
                    </div>
                    <div class="absolute inset-0 z-[1] cursor-pointer" onclick="openModal('${card.id}')"></div>
                `;
                cardsGrid.appendChild(cardEl);
            });
        }

        function openModal(id = null) {
            currentEditId = id;
            cardModal.classList.remove('hidden');
            cardModal.classList.add('show');
            document.body.style.overflow = 'hidden';
            
            if (id) {
                const card = vaultData.find(c => c.id === id);
                document.getElementById('cardLabel').value = card.label;
                document.getElementById('cardNumber').value = card.number;
                document.getElementById('cardExpiry').value = card.expiry;
                document.getElementById('cardCvv').value = card.cvv;
                document.getElementById('cardHolder').value = card.holder;
                
                inNum.dispatchEvent(new Event('input'));
                inName.dispatchEvent(new Event('input'));
                inExp.dispatchEvent(new Event('input'));
                
                toggleEditMode(false); // Open in view mode
            } else {
                resetForm();
                toggleEditMode(true); // Open in edit mode for new card
                document.getElementById('modalTitle').innerText = "New Card";
                document.getElementById('editBtn').classList.add('hidden');
            }
        }

        function toggleEditMode(enable) {
            isEditMode = enable;
            const inputs = document.querySelectorAll('#cardModal input');
            const editBtn = document.getElementById('editBtn');
            const doneBtn = document.getElementById('doneBtn');
            const delCon = document.getElementById('deleteContainer');
            const copyBtns = document.querySelectorAll('.copy-btn');
            const closeBtnText = document.getElementById('closeBtnText');
            const modalTitle = document.getElementById('modalTitle');

            inputs.forEach(input => {
                input.readOnly = !enable;
                if (!enable) {
                    input.classList.add('cursor-default');
                    input.type = input.id === 'cardCvv' ? 'password' : 'text'; // Keep CVV masked in view
                } else {
                    input.classList.remove('cursor-default');
                }
            });

            if (enable) {
                editBtn.classList.add('hidden');
                doneBtn.classList.remove('hidden');
                delCon.classList.toggle('hidden', !currentEditId);
                copyBtns.forEach(b => b.classList.add('hidden'));
                closeBtnText.innerText = "Cancel";
                modalTitle.innerText = currentEditId ? "Edit Card" : "New Card";
            } else {
                editBtn.classList.remove('hidden');
                doneBtn.classList.add('hidden');
                delCon.classList.add('hidden');
                copyBtns.forEach(b => b.classList.remove('hidden'));
                closeBtnText.innerText = "Close";
                modalTitle.innerText = "View Card";
            }
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            const textToCopy = el.value;
            const tempInput = document.createElement("input");
            tempInput.value = textToCopy;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            const toast = document.getElementById('copyToast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function resetForm() {
            document.querySelectorAll('#cardModal input').forEach(i => i.value = '');
            preNum.innerText = '•••• •••• •••• ••••';
            preName.innerText = 'YOUR NAME';
            preExp.innerText = '00/00';
            preType.className = 'fas fa-credit-card text-4xl opacity-40';
        }

        function closeModal() {
            cardModal.classList.add('hidden');
            cardModal.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        function saveCard() {
            const label = document.getElementById('cardLabel').value;
            const number = document.getElementById('cardNumber').value;
            const expiry = document.getElementById('cardExpiry').value;
            const cvv = document.getElementById('cardCvv').value;
            const holder = document.getElementById('cardHolder').value;

            if (!label || !number) return;

            if (currentEditId) {
                const idx = vaultData.findIndex(c => c.id === currentEditId);
                vaultData[idx] = { ...vaultData[idx], label, number, expiry, cvv, holder };
            } else {
                vaultData.push({
                    id: Date.now().toString(),
                    type: 'card',
                    label,
                    number,
                    expiry,
                    cvv,
                    holder,
                    timestamp: new Date().toISOString()
                });
            }

            localStorage.setItem('passpro_data', JSON.stringify(vaultData));
            renderCards();
            closeModal();
        }

        function deleteCard() {
            if (confirm('Permanently delete this card from your vault?')) {
                vaultData = vaultData.filter(c => c.id !== currentEditId);
                localStorage.setItem('passpro_data', JSON.stringify(vaultData));
                renderCards();
                closeModal();
            }
        }

        document.getElementById('export-cards-btn').addEventListener('click', () => {
            const data = localStorage.getItem('passpro_data');
            const blob = new Blob([data || '[]'], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'card_vault_backup.json';
            a.click();
        });

        document.getElementById('import-cards-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    localStorage.setItem('passpro_data', JSON.stringify(importedData));
                    location.reload();
                } catch (err) {
                    alert("Invalid JSON file");
                }
            };
            reader.readAsText(file);
        });

        searchInput.addEventListener('input', (e) => renderCards(e.target.value));

        window.onload = init;
    </script>
    <script src="navbar.js"></script>
</body>
</html>
