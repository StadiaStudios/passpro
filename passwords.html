<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>PassPro - My Passwords</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="assets/favicon.png">
    <script src="scripts/pinlock.js"></script>
    <script src="scripts/themes.js"></script>
    <script src="scripts/loading-screen.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 5vw;
        }
        #vault {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            border-color: #444;
        }
        .card h3 {
            margin: 0 0 15px 0;
            color: #bb86fc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .card p {
            margin: 8px 0;
            font-size: 14px;
        }
        .card a {
            color: #03dac6;
            text-decoration: none;
            word-break: break-all;
            overflow-wrap: anywhere;
            display: inline-block;
            max-width: 100%;
        }
        .card a:hover {
            text-decoration: underline;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 8px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        .btn-danger {
            background-color: #ff4545;
            color: white;
        }
        .btn-danger:hover {
            background-color: #b35565;
        }
        .arrange-controls-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 0;
        }
        .arrange-order-select, .arrange-manual-btns-row {
            flex: unset;
        }
        .arrange-order-select {
            background-color: #232323;
            color: #e0e0e0;
            border: none;
            border-radius: 4px;
            padding: 7px 15px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 4px;
            transition: background 0.15s, color 0.15s;
        }
        .arrange-order-select:focus {
            outline: 2px solid #bb86fc;
        }
        .arrange-btn.active, .arrange-btn.active:hover {
            background-color: #bb86fc;
            color: #1e1e1e;
        }
        .arrange-manual-btns-row {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .manual-sort-btn {
            flex: 0 0 auto;
            background: #252525;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 10px 4px 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .manual-sort-btn:hover {
            background: #3a3a3a;
        }
        .manual-disable {
            opacity: 0.35;
            pointer-events: none;
        }
        .empty-state {
            text-align: center;
            color: #aaa;
            margin-top: 60px;
            grid-column: 1 / -1;
            font-size: 1.2rem;
        }
        .modal-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(18,18,18,0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-popup {
            background: #232323;
            border-radius: 11px;
            padding: 36px 32px 30px 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.45);
            max-width: 98vw;
            max-height: 96vh;
            min-width: 320px;
            color: #e0e0e0;
            position: relative;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }
        @media (min-width: 900px) and (orientation: landscape), (min-width: 1300px) {
            .modal-popup {
                max-width: 750px;
                min-width: 500px;
                padding: 40px 50px 36px 50px;
            }
        }
        .modal-popup h3 {
            font-size: 21px;
            margin-top: 0;
            color: #bb86fc;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .modal-popup p {
            font-size: 15px;
            margin: 8px 0;
            word-break: break-all;
        }
        .modal-popup pre.notes-content {
            font-size: 15px;
            margin: 8px 0;
            background: none;
            color: inherit;
            border: none;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-family: inherit;
            padding: 0;
            box-shadow: none;
            max-height: 220px;
            overflow: auto;
        }
        .modal-popup a {
            color: #03dac6;
            text-decoration: none;
            word-break: break-all;
            overflow-wrap: anywhere;
            display: inline-block;
            max-width: 100%;
            font-size: 15px;
        }
        .modal-popup .close-modal-btn {
            position: absolute;
            top: 11px;
            right: 14px;
            font-size: 22px;
            background: none;
            color: #999;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            padding: 2px 6px;
        }
        .modal-popup .close-modal-btn:hover {
            color: #fff;
        }
        ::-webkit-scrollbar {
            width: 12px;
            background: #181818;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d2d2d;
            border-radius: 8px;
            border: 2px solid #121212;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bb86fc;
        }
        ::-webkit-scrollbar-corner {
            background: #181818;
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #2d2d2d #181818;
        }
        @media (max-width: 600px) {
            .container {
                padding: 0 2vw;
            }
            #vault {
                grid-template-columns: 1fr;
            }
            .card a, .modal-popup a {
                font-size: 13px;
            }
            .modal-popup {
                min-width: unset;
                max-width: 99vw;
                padding: 14px 2vw 12px 2vw;
            }
            .modal-popup pre.notes-content {
                font-size: 13px;
                max-height: 34vh;
                overflow: auto;
            }
            .arrange-controls-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
        @media (min-width: 1600px) {
            .modal-popup {
                max-width: 900px;
                min-width: 650px;
            }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container">
    <h2>My Passwords</h2>
    <div class="arrange-controls-row" id="arrange-controls-row">
        <button id="arrange-btn" class="arrange-btn" title="Arrange your passwords">Arrange</button>
        <select id="arrange-order-select" class="arrange-order-select" style="display:none;">
            <option value="az">A-Z (Title)</option>
            <option value="za">Z-A (Title)</option>
            <option value="manual">Manual</option>
        </select>
    </div>
    <div id="vault"></div>
</div>
<div id="password-modal-bg" class="modal-bg" style="display: none;">
    <div class="modal-popup" id="password-modal-content"></div>
</div>

<script src="navbar.js"></script>
<script src="scripts/editor.js"></script>
<script>
    let currentArrange = localStorage.getItem('pm_arrange_order') || 'az';

    function sortPasswords(passwords, arrangeType) {
        let sorted = [...passwords];
        switch (arrangeType) {
            case 'az':
                sorted.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
                break;
            case 'za':
                sorted.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
                break;
            case 'manual':
                const manualOrder = JSON.parse(localStorage.getItem('pm_manual_order') || '[]');
                if (manualOrder.length === passwords.length) {
                    sorted = manualOrder.map(i => passwords[i]);
                }
                break;
        }
        return sorted;
    }

    function saveManualOrder(orderArr) {
        localStorage.setItem('pm_manual_order', JSON.stringify(orderArr));
    }

    function getManualOrder(pwArr) {
        let order = JSON.parse(localStorage.getItem('pm_manual_order') || '[]');
        if (!Array.isArray(order) || order.length !== pwArr.length) {
            order = [...Array(pwArr.length).keys()];
            saveManualOrder(order);
        }
        return order;
    }

    function loadPasswords() {
        const vault = document.getElementById('vault');
        const data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };

        if (!data.passwords.length) {
            vault.innerHTML = '<div class="empty-state">No passwords saved yet.</div>';
            return;
        }

        if (currentArrange === "manual") {
            let order = getManualOrder(data.passwords);
            if (order.length !== data.passwords.length) {
                order = [...Array(data.passwords.length).keys()];
                saveManualOrder(order);
            }
        }

        const arranged = sortPasswords(data.passwords, currentArrange);

        vault.innerHTML = '';
        arranged.forEach((entry, displayIndex) => {
            let realIndex;
            if (currentArrange === "manual") {
                const manualOrderArr = getManualOrder(data.passwords);
                realIndex = manualOrderArr[displayIndex];
            } else {
                realIndex = data.passwords.indexOf(entry);
            }

            const card = document.createElement('div');
            card.className = 'card';

            let manualBtns = '';
            if (currentArrange === "manual") {
                manualBtns = `
                <div class="arrange-manual-btns-row">
                    <button class="manual-sort-btn${displayIndex===0 ? ' manual-disable' : ''}" onclick="moveManual(${displayIndex},-1)" ${displayIndex===0?'tabindex="-1"':''} title="Move up">&#8679;</button>
                    <button class="manual-sort-btn${displayIndex===arranged.length-1?' manual-disable':''}" onclick="moveManual(${displayIndex},1)" ${displayIndex===arranged.length-1?'tabindex="-1"':''} title="Move down">&#8681;</button>
                </div>`;
            }

            card.innerHTML = `
                <h3>${entry.title}</h3>
                <p><strong>User/Email:</strong> ${entry.username}</p>
                <p><strong>Password:</strong> <span id="pwd-${displayIndex}">••••••••</span></p>
                ${manualBtns}
                <div class="controls">
                    <button onclick="showPasswordPopupFromSorted(${displayIndex})" id="btn-${displayIndex}">Show</button>
                    <button class="btn-danger" onclick="deletePasswordFromSorted(${displayIndex})">Delete</button>
                </div>
            `;
            vault.appendChild(card);
        });

        if (currentArrange === "manual") {
            window._arrangedIndexes = getManualOrder(data.passwords);
        } else {
            window._arrangedIndexes = arranged.map(entry => data.passwords.indexOf(entry));
        }
    }

    window.moveManual = function(from, dir) {
        const data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };
        let order = getManualOrder(data.passwords);
        const to = from + dir;
        if (to < 0 || to >= order.length) return;
        [order[from], order[to]] = [order[to], order[from]];
        saveManualOrder(order);
        loadPasswords();
    };

    function showPasswordPopupFromSorted(sortedIndex) {
        if (!window._arrangedIndexes) loadPasswords();
        showPasswordPopup(window._arrangedIndexes[sortedIndex]);
    }

    function deletePasswordFromSorted(sortedIndex) {
        if (!window._arrangedIndexes) loadPasswords();
        deletePassword(window._arrangedIndexes[sortedIndex]);
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            hidePasswordPopup();
        }
    });

    document.addEventListener('click', function(e) {
        const bg = document.getElementById('password-modal-bg');
        if (!bg || (bg.style.display !== 'flex' && bg.style.display !== '')) return;
        if (e.target === bg) {
            hidePasswordPopup();
        }
    });

    function escapeHTMLpreservingSpacesAndNewlines(text) {
        if (!text) return '';
        return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function showPasswordPopup(index) {
        const data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };
        const entry = data.passwords && data.passwords[index];
        if (!entry) return;

        const modalBg = document.getElementById('password-modal-bg');
        const modalContent = document.getElementById('password-modal-content');

        modalContent.innerHTML = `
            <button class="close-modal-btn" onclick="hidePasswordPopup()" aria-label="Close modal">&times;</button>
            <h3>${entry.title}</h3>
            <p><strong>User/Email:</strong> ${entry.username}</p>
            <p><strong>Password:</strong> <span style="font-family:monospace">${entry.password.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span></p>
            ${
                entry.url && entry.url.trim()
                ? `<p><strong>URL:</strong> <a href="${entry.url}" target="_blank" rel="noopener">${entry.url}</a></p>`
                : ''
            }
            ${
                entry.notes && entry.notes.trim()
                ? `<p><strong>Notes:</strong></p><pre class="notes-content">${escapeHTMLpreservingSpacesAndNewlines(entry.notes)}</pre>`
                : ''
            }
        `;
        modalBg.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function hidePasswordPopup() {
        const modalBg = document.getElementById('password-modal-bg');
        modalBg.style.display = 'none';
        document.body.style.overflow = '';
    }

    function deletePassword(index) {
        if (confirm('Are you sure you want to delete this entry?')) {
            const data = JSON.parse(localStorage.getItem('pm_data'));
            data.passwords.splice(index, 1);
            localStorage.setItem('pm_data', JSON.stringify(data));
            if (currentArrange === "manual") {
                let order = JSON.parse(localStorage.getItem('pm_manual_order') || '[]');
                order = order.filter(i => i !== index).map(i => i > index ? i - 1 : i);
                saveManualOrder(order);
            }
            loadPasswords();
            hidePasswordPopup();
        }
    }

    const arrangeBtn = document.getElementById('arrange-btn');
    const arrangeSelect = document.getElementById('arrange-order-select');

    arrangeBtn.addEventListener('click', function() {
        if (arrangeSelect.style.display === 'none' || arrangeSelect.style.display === '') {
            arrangeSelect.style.display = 'inline-block';
            arrangeBtn.classList.add('active');
            arrangeSelect.focus();
        } else {
            arrangeSelect.style.display = 'none';
            arrangeBtn.classList.remove('active');
        }
    });

    arrangeSelect.addEventListener('change', function() {
        currentArrange = arrangeSelect.value;
        localStorage.setItem('pm_arrange_order', currentArrange);
        if (currentArrange === 'manual') {
            const data = JSON.parse(localStorage.getItem('pm_data')) || { passwords: [] };
            let manualOrder = JSON.parse(localStorage.getItem('pm_manual_order') || '[]');
            if (!manualOrder || manualOrder.length !== data.passwords.length) {
                manualOrder = [...Array(data.passwords.length).keys()];
                saveManualOrder(manualOrder);
            }
        }
        loadPasswords();
    });
    arrangeSelect.value = currentArrange;

    arrangeSelect.addEventListener('blur', function() {
        setTimeout(() => {
            arrangeSelect.style.display = 'none';
            arrangeBtn.classList.remove('active');
        }, 130);
    });

    document.addEventListener('click', (e) => {
        const ar = document.getElementById('arrange-controls-row');
        if (!ar.contains(e.target)) {
            arrangeSelect.style.display = 'none';
            arrangeBtn.classList.remove('active');
        }
    });

    document.getElementById('arrange-controls-row').addEventListener('click', (e) => {
        e.stopPropagation();
    });

    loadPasswords();
</script>
</body>
</html>
